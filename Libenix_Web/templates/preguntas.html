<!DOCTYPE html>
<html>
<head>
    <title>Preguntas</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 20px;
    }

    h1, h2 {
        color: #222;
    }

    table {
        border-collapse: collapse;
        width: 100%;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }

    th {
        background: #333;
        color: white;
    }

    a {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 12px;
        background: #333;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    a:hover {
        background: #555;
    }

    hr {
        margin: 20px 0;
    }

    .card {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
</style>
</head>
<body>

<h1>Crear Preguntas</h1>

<form method="POST" action="/guardar-evaluacion">

<input type="hidden" name="nombre" value="{{ nombre }}">
<input type="hidden" name="curso" value="{{ curso }}">
<input type="hidden" name="cantidad" value="{{ cantidad }}">

{% for i in range(cantidad) %}

<h3>Pregunta {{ i + 1 }}</h3>

Tema:
<br>
<input
type="text"
name="tema_{{ i }}"
required>

<br><br>

Pregunta:
<br>
<input
type="text"
name="pregunta_{{ i }}"
required>

<br><br>

Respuesta:
<br>
<input
type="text"
name="respuesta_{{ i }}"
required>

<br><br>

Puntaje:
<br>
<input
type="number"
name="puntaje_{{ i }}"
required>

<hr>

{% endfor %}

<button type="submit">
Guardar Evaluación
</button>

</form>

</body>
</html>
