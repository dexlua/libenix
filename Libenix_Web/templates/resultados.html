<h1>Resultados</h1>

{% for r in data %}
<p>
{{ r[0] }} | {{ r[1] }} | {{ r[2] }} | {{ r[3] }} |
{{ r[4] }} | {{ r[5] }}% | {{ r[6] }}
</p>

<td>
    {% if r[1] > 75 %}
        🟢 Aprobado
    {% elif r[1] > 50 %}
        🟡 Estable
    {% else %}
        🔴 Reprobado
    {% endif %}
</td>
{% endfor %}
