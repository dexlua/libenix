<!DOCTYPE html>
<html>
<head>
    <title>Resultado</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 20px;
    }

    h1, h2 {
        color: #222;
    }

    table {
        border-collapse: collapse;
        width: 100%;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }

    th {
        background: #333;
        color: white;
    }

    a {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 12px;
        background: #333;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    a:hover {
        background: #555;
    }

    hr {
        margin: 20px 0;
    }

    .card {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
</style>
</head>
<body>

<h1>Resultado de la Evaluación</h1>

<p>
Correctas: {{ correctas }}
</p>

<p>
Total: {{ total }}
</p>

<p>
Porcentaje: {{ porcentaje }}%
</p>
<h2>Falencias Detectadas</h2>

{% if falencias %}

<ul>

{% for f in falencias %}

<li>{{ f }}</li>

{% endfor %}

</ul>

{% else %}

<p>No se detectaron falencias.</p>

{% endif %}

<a href="/estudiante">
Volver
</a>

<br><br>

<a href="/" style="padding:10px; background:#333; color:white; text-decoration:none; border-radius:5px;">
    Volver al menú principal
</a>

</body>
</html>
