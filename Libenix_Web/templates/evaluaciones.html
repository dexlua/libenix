<!DOCTYPE html>
<html>
<head>
    <title>Evaluaciones</title>
    <style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f6f8;
        margin: 0;
        padding: 20px;
    }

    h1, h2 {
        color: #222;
    }

    table {
        border-collapse: collapse;
        width: 100%;
        background: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    th, td {
        padding: 10px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }

    th {
        background: #333;
        color: white;
    }

    a {
        display: inline-block;
        margin-top: 10px;
        padding: 8px 12px;
        background: #333;
        color: white;
        text-decoration: none;
        border-radius: 5px;
    }

    a:hover {
        background: #555;
    }

    hr {
        margin: 20px 0;
    }

    .card {
        background: white;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
</style>
</head>
<body>

<h1>Evaluaciones por Curso</h1>

{% for curso, lista in cursos.items() %}

    <hr>
    <h2>{{ curso }}</h2>

    {% for evaluacion in lista %}

        <div class="card">
        <b>{{ evaluacion[1] }}</b><br>
        ID: {{ evaluacion[0] }}<br>

        <a href="/resultados/{{ evaluacion[0] }}">
        Ver resultados
         </a>
        </div>

        <a href="/resultados/{{ evaluacion[0] }}">
            Ver resultados
        </a>

        <br><br>

    {% endfor %}

{% endfor %}

<br><br>

<a href="/docente" style="padding:10px; background:#333; color:white; text-decoration:none; border-radius:5px;">
    Volver al menú docente
</a>

</body>
</html>
